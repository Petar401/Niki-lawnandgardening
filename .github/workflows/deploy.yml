# Builds the Vite SPA and pushes the output to the `gh-pages` branch,
# which GitHub Pages serves automatically (no repo settings change needed —
# the default "Deploy from a branch → gh-pages" source works out of the box).
# Also exposes a manual "Run workflow" button for one-off deploys.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/tower-doors-3d-experience]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
