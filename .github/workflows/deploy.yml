# Builds the Vite SPA and publishes it to GitHub Pages on every push to
# `main`. Also exposes a manual "Run workflow" button for one-off deploys.
#
# Prereq (one-time): in repo Settings → Pages, set Source to
# "GitHub Actions". The first run after that publishes the live site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/tower-doors-3d-experience]
  workflow_dispatch:

# Standard permissions block for the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel duplicate in-progress deploys for the same ref; a fresh deploy
# overrides an older one without queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
