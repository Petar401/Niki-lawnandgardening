# Pull-request / push quality gate: type-check, lint, and run the test
# suite. Runs on every PR and on pushes to any branch so issues are caught
# before they reach `main` (deploy.yml handles the actual Pages publish).

name: CI

on:
  pull_request:
  push:
    branches-ignore: []

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
